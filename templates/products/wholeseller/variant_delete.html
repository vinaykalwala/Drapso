
{% load static %}

{% block title %}Delete Variant - Wholeseller{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h3 class="card-title mb-0">Confirm Delete</h3>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete variant <strong>"{{ variant.variant_name }}"</strong>?</p>
                    <p class="text-muted">Product: {{ variant.product.name }}</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'products:wholeseller_product_variants' variant.product.id %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
