
{% block title %}Delete Plan{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Delete Plan</h4>
                </div>
                <div class="card-body">
                    <p class="lead">Are you sure you want to delete the plan <strong>"{{ plan.get_name_display }}"</strong>?</p>
                    <p class="text-danger">This action cannot be undone and will affect all stores using this plan.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'resellers:plan_list' %}" class="btn btn-secondary me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-danger">Yes, Delete Plan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
