

{% block title %}Store Not Found{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow">
                <div class="card-body">
                    <i class="fas fa-store-slash display-1 text-muted mb-4"></i>
                    <h2>Store Not Found</h2>
                    <p>The store "<strong>{{ subdomain }}</strong>" does not exist or is not published yet.</p>
                    <a href="/" class="btn btn-primary">Go to Homepage</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
