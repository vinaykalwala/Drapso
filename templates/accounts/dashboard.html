
  {% include "includes/sidebar.html" %}
{% block content %}
<div class="content">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</h4>
            </div>
          
                    
                    <i class="fas fa-user-circle fa-5x text-primary mb-3" style="display: none;"></i>
                    <h2 class="display-4">Welcome, {{ user.first_name|default:user.username }}!</h2>
                    <p class="lead text-muted">You are logged in as a <strong>{{ user.get_role_display }}</strong></p>
                    
                    <hr class="my-4 w-50 mx-auto">
                    
                    <div class="mt-4">
                        <a href="{% url 'accounts:profile' %}" class="btn btn-info btn-lg me-2">
                            <i class="fas fa-user-edit me-2"></i>My Profile
                        </a>
                        <a href="{% url 'accounts:change_password' %}" class="btn btn-warning btn-lg">
                            <i class="fas fa-key me-2"></i>Change Password
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
