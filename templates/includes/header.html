{% load static %}

<header>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* HEADER */

.header{
position:absolute;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* container */

.container{
width:1200px;
max-width:94%;
margin:auto;
}

/* navbar */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 0;

/* light white line */
border-bottom:1px solid rgba(255,255,255,0.25);
}

/* logo */

.logo img{
height:38px;
}

/* menu */

.menu{
display:flex;
align-items:center;
gap:32px;
}

/* links */

.menu a{
text-decoration:none;
color:white;
font-size:15px;
font-weight:500;
position:relative;
padding-bottom:6px;
}

/* underline */

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0;
height:2px;
background:white;
transition:.25s;
}

.menu a:hover::after{
width:100%;
}

/* right side */

.right{
display:flex;
align-items:center;
gap:18px;
}

/* login */

.login{
color:white;
text-decoration:none;
font-size:15px;
}

/* button */

.btn{
background:linear-gradient(135deg,#34D399,#10B981);
color:white;
border:none;
padding:8px 18px;
border-radius:8px;
font-size:14px;
font-weight:600;
cursor:pointer;
box-shadow:0 8px 18px rgba(16,185,129,.35);
}

/* toggle */

.menu-toggle{
display:none;
font-size:26px;
color:white;
cursor:pointer;
}

/* hide mobile items on desktop */

.login-mobile,
.btn-mobile{
display:none;
}

/* MOBILE */

@media(max-width:900px){

/* hide desktop buttons */

.right .login,
.right .btn{
display:none;
}

/* dropdown */

.menu{
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
flex-direction:column;
width:92%;
background:rgba(65,55,210,.97);
padding:25px;
border-radius:14px;
display:none;
gap:18px;
text-align:center;
box-shadow:0 25px 50px rgba(0,0,0,.25);
}

.menu.active{
display:flex;
}

/* show mobile buttons */

.login-mobile{
display:block;
color:white;
}

.btn-mobile{
display:block;
width:100%;
}

/* show toggle */

.menu-toggle{
display:block;
}

}

</style>



<div class="header">

<div class="container">

<nav class="navbar">

<!-- logo -->

<div class="logo">
<img src="{% static 'images/drapsologo.jpg' %}">
</div>


<!-- menu -->

<div class="menu" id="menu">

<a href="#">Home</a>

<a href="#">How it Works</a>

<a href="#">Features</a>

<a href="#">Contact</a>

<!-- mobile only -->

<a href="#" class="login-mobile">Login</a>

<button class="btn btn-mobile">
Start Selling
</button>

</div>


<!-- desktop right -->

<div class="right">

<a href="#" class="login">Login</a>

<button class="btn">Start Selling</button>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</div>

</nav>

</div>

</div>


<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

</script>

</header>
