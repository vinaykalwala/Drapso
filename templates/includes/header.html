{% load static %}

<header>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>

/* HEADER */

.header{
position:absolute;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* container */

.container{
width:1200px;
max-width:94%;
margin:auto;
}

/* navbar */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 0;
border-bottom:1px solid rgba(255,255,255,0.25);
}

/* LOGO TEXT */

.logo{
font-family:'Poppins',sans-serif;
font-size:28px;
font-weight:700;
color:white;

letter-spacing:1.5px;

background:linear-gradient(135deg,#ffffff,#fcfffe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 2px 6px rgba(0,0,0,0.25),
0 1px 1px rgba(255,255,255,0.15);

transition:.3s;
}

/* hover glow effect */

.logo:hover{
letter-spacing:2px;

text-shadow:
0 4px 14px rgba(16,185,129,.45),
0 2px 4px rgba(0,0,0,.25);
}

/* menu */

.menu{
display:flex;
align-items:center;
gap:32px;
}

/* links */

.menu a{
text-decoration:none;
color:white;
font-size:15px;
font-weight:500;
position:relative;
padding-bottom:6px;
}

/* underline */

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0;
height:2px;
background:white;
transition:.25s;
}

.menu a:hover::after{
width:100%;
}

/* right side */

.right{
display:flex;
align-items:center;
gap:18px;
}

/* login */

.login{
color:white;
text-decoration:none;
font-size:15px;
}

/* button */

.btn{
background:linear-gradient(135deg,#34D399,#10B981);
color:white;
border:none;
padding:8px 18px;
border-radius:8px;
font-size:14px;
font-weight:600;
cursor:pointer;
box-shadow:0 8px 18px rgba(16,185,129,.35);
}

/* toggle */

.menu-toggle{
display:none;
font-size:26px;
color:white;
cursor:pointer;
}

/* hide mobile items on desktop */

.login-mobile,
.btn-mobile{
display:none;
}

/* MOBILE */

@media(max-width:900px){

.right .login,
.right .btn{
display:none;
}

/* dropdown RIGHT SIDE */

.menu{
position:absolute;
top:70px;
right:3%;
flex-direction:column;
width:240px;
background:white;
padding:22px;
border-radius:14px;
display:none;
gap:18px;
text-align:left;
box-shadow:0 25px 50px rgba(0,0,0,.25);
}

/* active */

.menu.active{
display:flex;
}

/* mobile links */

.menu a{
color:#222;
}

/* mobile buttons */

.login-mobile{
display:block;
color:#222;
}

.btn-mobile{
display:block;
width:100%;
}

/* show toggle */

.menu-toggle{
display:block;
}

}

</style>



<div class="header">

<div class="container">

<nav class="navbar">

<!-- TEXT LOGO -->

<div class="logo">
Drapso
</div>


<!-- menu -->

<div class="menu" id="menu">

<a href="{% url 'home' %}">Home</a>

<a href="{% url 'about' %}">About</a>

<a href="{% url 'contact_create' %}">Contact</a>


{% if user.is_authenticated %}

<a href="{% url 'accounts:dashboard' %}" class="login-mobile">Dashboard</a>

{% else %}

<a href="{% url 'accounts:login' %}" class="login-mobile">Login</a>

{% endif %}

<button class="btn btn-mobile">
Start Selling
</button>

</div>



<!-- desktop right -->

<div class="right">

{% if user.is_authenticated %}

<a href="{% url 'accounts:dashboard' %}" class="login">Dashboard</a>

{% else %}

<a href="{% url 'accounts:login' %}" class="login">Login</a>

{% endif %}

<button class="btn">Start Selling</button>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</div>

</nav>

</div>

</div>


<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

</script>

</header>
