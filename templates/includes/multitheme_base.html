{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ store.store_name }}</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f5;
}

/* container */

.container{
width:1400px;
max-width:92%;
margin:auto;
}


/* HEADER */

.header{
background:#059669;
padding:12px 0;
color:white;
}

.header-row{
display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
}

.logo img{
height:34px;
}

.store-scroll{
flex:1;
margin:0 15px;
font-size:20px;
font-weight:700;
letter-spacing:.5px;
}

.track-btn{
background:white;
color:#059669;
padding:8px 18px;
border-radius:8px;
text-decoration:none;
font-weight:700;
font-size:14px;
white-space:nowrap;
}


/* FOOTER */

.footer{
margin-top:40px;
padding:20px 0;
background:white;
border-top:1px solid #eee;
}

.footer-row{
display:flex;
justify-content:center;
gap:25px;
font-size:13px;
flex-wrap:wrap;
}

.footer a{
color:#059669;
text-decoration:none;
}

</style>

</head>


<body>


<!-- HEADER -->

<div class="header">

<div class="container">

<div class="header-row">


<!-- dynamic logo -->

<div class="logo">

{% if store.store_logo %}

<img src="{{ store.store_logo.url }}">

{% else %}

<img src="{% static 'images/previewlogo.png' %}">

{% endif %}

</div>



<!-- dynamic store name -->

<div class="store-scroll">

<marquee>

{{ store.store_name }}

</marquee>

</div>



<a href="#" class="track-btn">

Track My Order

</a>


</div>

</div>

</div>



<!-- PAGE CONTENT -->

{% block content %}
{% endblock %}



<!-- FOOTER -->

<div class="footer">

<div class="container">

<div class="footer-row">

<a href="#">Privacy</a>

<a href="#">Terms</a>

<a href="#">Contact</a>

<span>© {{ store.store_name }}</span>

</div>

</div>

</div>



</body>

</html>
