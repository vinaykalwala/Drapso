<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

{% load static %}

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

/* mobile header */

.topbar{
display:none;
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:white;
border-bottom:1px solid #eef2f7;
align-items:center;
justify-content:space-between;
padding:0 18px;
z-index:2100;
}

.brand img{
height:26px;
}

/* sidebar */

.sidebar{
width:240px;
background:#ffffff;
border-right:1px solid #eef2f7;
position:fixed;
top:0;
left:0;
height:100vh;
display:flex;
flex-direction:column;
z-index:2000;

/* softer professional shadow */
box-shadow:2px 0 8px rgba(0,0,0,0.04);
}

/* logo */

.logo-box{
display:flex;
align-items:center;
justify-content:center;
padding:14px 0;
border-bottom:1px solid #eef2f7;
}

.logo-box img{
height:45px;
}

/* menu */

.menu{
flex:1;
overflow-y:auto;
padding:18px 14px;
display:flex;
flex-direction:column;
gap:6px;
}

/* links */

.menu a,
.logout-box a{
display:flex;
align-items:center;
gap:12px;
padding:11px 14px;
text-decoration:none;
color:#374151;
border-radius:10px;
font-size:14px;
transition:.2s;
}

.menu i,
.logout-box i{
font-size:16px;
width:20px;
}

/* hover */

.menu a:hover{
background:#f5f5f5;
color:#111827;
}

/* active */

.menu a.active{
background:#ecfdf5;
color:#059669;
font-weight:500;
}

/* modern sticky logout */

.logout-box{
padding:16px;
border-top:1px solid #f1f5f9;
background:#ffffff;
}

/* modern logout button */

.logout-box a{
display:flex;
align-items:center;
gap:12px;
padding:13px 14px;
border-radius:14px;
text-decoration:none;
font-size:14px;
font-weight:600;
color:#ef4444;

/* soft gradient */
background:linear-gradient(180deg,#fff,#fff5f5);

border:1px solid #ffe4e6;

transition:.2s ease;
}

/* hover effect */

.logout-box a:hover{

background:linear-gradient(180deg,#fff1f2,#ffe4e6);

border-color:#fecdd3;

transform:translateY(-1px);

box-shadow:0 6px 14px rgba(239,68,68,.12);

color:#dc2626;
}

/* click */

.logout-box a:active{

transform:scale(.98);

box-shadow:none;

}

/* content */

.content{
margin-left:240px;
padding:20px;
}

/* toggle */

.toggle-btn{
border:1px solid #e2e8f0;
background:white;
padding:6px 11px;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

/* overlay */

.overlay{
position:fixed;
inset:0;
background:rgba(15,23,42,.35);
display:none;
z-index:1500;
}

/* mobile */

@media(max-width:900px){

.topbar{
display:flex;
}

.sidebar{
left:-260px;
top:60px;
height:calc(100vh - 60px);
}

.sidebar.active{
left:0;
}

.overlay.active{
display:block;
}

.content{
margin-left:0;
margin-top:70px;
padding:15px;
}

.logo-box{
display:none;
}

}

</style>



<!-- mobile header -->

<div class="topbar">

<div class="brand">
<img src="{% static 'images/drapsologo.jpg' %}">
</div>

<button class="toggle-btn" onclick="toggleSidebar()">
☰
</button>

</div>



<!-- sidebar -->

<div class="sidebar" id="sidebar">

<div class="logo-box">
<img src="{% static 'images/drapsologo.jpg' %}">
</div>



<!-- menu -->

<div class="menu">

<a href="#" class="active">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="#">
<i class="fa-solid fa-store"></i>
My Store
</a>

<a href="#">
<i class="fa-solid fa-box"></i>
Products
</a>

<a href="#">
<i class="fa-solid fa-bag-shopping"></i>
Orders
</a>

<a href="#">
<i class="fa-solid fa-users"></i>
Wholeseller
</a>

<a href="#">
<i class="fa-solid fa-building-columns"></i>
Bank Details
</a>

<a href="#">
<i class="fa-solid fa-user"></i>
Profile
</a>

</div>



<!-- sticky modern logout -->

<div class="logout-box">

<a href="#">
<i class="fa-solid fa-right-from-bracket"></i>
Logout

</a>

</div>


</div>



<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>



<div class="content">

<!-- page content -->

</div>



<script>

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("active");

document.getElementById("overlay").classList.toggle("active");

}

</script>
