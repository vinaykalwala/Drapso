{% extends "dashboard_base.html" %}
{% block content %}
<div class="content">
<h2>Contact Messages</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Subject</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for contact in contacts %}
    <tr>
        <td>{{ contact.name }}</td>
        <td>{{ contact.email }}</td>
        <td>{{ contact.subject }}</td>
        <td>{{ contact.created_at }}</td>
        <td>
            <a href="{% url 'contact_detail' contact.id %}">View</a> |
            <a href="{% url 'contact_delete' contact.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
</div>
{% endblock %}
