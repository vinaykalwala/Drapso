<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oops • Drapso</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family: 'Inter', sans-serif;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#faf5ff,#fdf4ff,#eff6ff);
    overflow:hidden;
}

/* ===== FLOATING SOFT SHAPES (UPDATED COLORS) ===== */
.shape{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:.5;
    animation:float 8s ease-in-out infinite;
}

.shape.one{width:300px;height:300px;background:#a855f7;top:10%;left:10%;}
.shape.two{width:250px;height:250px;background:#ec4899;bottom:10%;right:10%;}
.shape.three{width:200px;height:200px;background:#3b82f6;top:50%;left:50%;}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-30px)}
}

/* ===== CARD ===== */
.box{
    position:relative;
    z-index:2;
    background:white;
    padding:50px 40px;
    border-radius:28px;
    box-shadow:0 25px 70px rgba(0,0,0,.1);
    max-width:500px;
    width:90%;
    text-align:center;
}

/* ===== EMOJI ANIMATION ===== */
.face{
    font-size:60px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
}

/* ===== TITLE ===== */
h1{
    font-size:30px;
    margin-top:15px;
    font-weight:800;
    background:linear-gradient(135deg,#3b82f6,#a855f7,#ec4899);
    -webkit-background-clip:text;
    color:transparent;
}

/* ===== TEXT ===== */
p{
    margin-top:10px;
    color:#6b7280;
    font-size:15px;
    line-height:1.6;
}

/* ===== BUTTON ===== */
.btn{
    margin-top:30px;
    display:inline-block;
    padding:14px 28px;
    border-radius:50px;
    background:linear-gradient(135deg,#3b82f6,#a855f7,#ec4899);
    color:white;
    font-weight:600;
    text-decoration:none;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(168,85,247,.4);
}

/* ===== BROKEN HEARTS ===== */
.heart{
    position:absolute;
    font-size:20px;
    animation:rise 5s linear infinite;
    opacity:.7;
}

@keyframes rise{
    from{transform:translateY(0);opacity:0}
    20%{opacity:1}
    to{transform:translateY(-300px);opacity:0}
}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
    h1{font-size:24px}
    .box{padding:35px 20px}
}
/* ===== MOBILE FIX (< 480px already exists, improve it) ===== */
@media (max-width: 480px) {

    body {
        padding: 15px;
        height: auto;
        min-height: 100vh;
    }

    .box {
        padding: 30px 18px;
        border-radius: 20px;
        width: 100%;
        max-width: 100%;
    }

    .face {
        font-size: 48px;
    }

    h1 {
        font-size: 22px;
        line-height: 1.2;
    }

    p {
        font-size: 14px;
    }

    .btn {
        width: 100%;
        padding: 12px;
        font-size: 14px;
    }

    /* reduce background shapes */
    .shape.one {
        width: 180px;
        height: 180px;
    }

    .shape.two {
        width: 150px;
        height: 150px;
    }

    .shape.three {
        width: 120px;
        height: 120px;
    }

    /* smaller floating hearts */
    .heart {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<!-- SOFT BACKGROUND -->
<div class="shape one"></div>
<div class="shape two"></div>
<div class="shape three"></div>

<!-- FLOATING BROKEN HEARTS -->
<script>
for(let i=0;i<25;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💔"; // broken heart
    h.style.left=Math.random()*100+"%";
    h.style.bottom="0";
    h.style.animationDuration=(3+Math.random()*4)+"s";
    document.body.appendChild(h);
}
</script>

<!-- MAIN -->
<div class="box">

    <div class="face">😕</div>

    <h1>Oops... something broke</h1>

    <p>
        {{ error|default:"We didn’t expect this either. But don’t worry — we’ll fix it quickly " }}
    </p>

    <a href="/" class="btn">
        Take me back safely 🚀
    </a>

</div>

</body>
</html>
