
{% load static %}

{% block content %}
<div class="container py-5">
    <form method="POST" id="checkoutForm">
        {% csrf_token %}
        <div class="row g-4">
            <div class="col-md-7">
                <div class="card p-4 shadow-sm border-0 rounded-4">
                    <h4 class="mb-4">Shipping Details</h4>
                    
                    <input type="hidden" name="shipping_charge" id="id_shipping_charge_hidden" value="0">
                    <input type="hidden" name="courier_name" id="id_courier_name_hidden">
                    <input type="hidden" name="courier_id" id="id_courier_id_hidden">
                    <input type="hidden" name="estimated_delivery_date" id="id_estimated_delivery_date_hidden">
                    <input type="hidden" name="pickup_address" id="id_pickup_address_hidden">
                    <input type="hidden" name="pickup_pincode" id="id_pickup_pincode_hidden">
                    <input type="hidden" name="pickup_address_type" id="id_pickup_address_type_hidden">
                    
                    <input type="hidden" name="weight" id="id_weight_hidden">
                    <input type="hidden" name="length" id="id_length_hidden">
                    <input type="hidden" name="breadth" id="id_breadth_hidden">
                    <input type="hidden" name="height" id="id_height_hidden">

                    <div class="row">
                        {% for field in form %}
                            <div class="{% if field.name == 'customer_name' or field.name == 'customer_email' or field.name == 'customer_phone' %}col-md-12{% else %}col-md-6{% endif %} mb-3">
                                <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                                {{ field }}
                            </div>
                        {% endfor %}
                    </div>

                    <div id="pincodeLoading" style="display:none;" class="text-primary small mb-3">
                        <div class="spinner-border spinner-border-sm me-2"></div>
                        Checking serviceability...
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 mt-3 shadow-sm" id="submitBtn" disabled>
                        <span id="btnText"><i class="fas fa-lock me-2"></i> Proceed to Payment</span>
                    </button>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card p-4 border-0 shadow-sm rounded-4 sticky-top" style="top: 20px;">
                    <h5 class="mb-4">Order Summary</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Subtotal</span>
                        <span>₹<span id="productPriceDisplay">0.00</span></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Shipping</span>
                        <span class="text-success fw-bold">FREE</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold fs-4 mt-2">
                        <span>Total</span>
                        <span class="text-primary">₹<span id="totalAmountDisplay">0.00</span></span>
                    </div>

                    <div id="deliveryInfo" class="mt-3 p-3 rounded-3 bg-light text-center small" style="display:none;">
                        <span id="deliveryMsg"></span>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    // Use Number() to ensure basePrice is treated as a digit
    const basePrice = Number("{{ variant.selling_price|default:product.selling_price }}") || 0;
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const infoBox = document.getElementById('deliveryInfo');
    const deliveryMsg = document.getElementById('deliveryMsg');
    let timer;

    function updateSummary() {
        const pincodeField = document.querySelector('[name="shipping_pincode"]');
        const pincode = pincodeField ? pincodeField.value.trim() : "";
        const qtyField = document.querySelector('[name="quantity"]');
        const qty = parseInt(qtyField ? qtyField.value : 1) || 1;
        
        // Update price display immediately
        const productTotal = basePrice * qty;
        document.getElementById('productPriceDisplay').innerText = productTotal.toFixed(2);
        document.getElementById('totalAmountDisplay').innerText = productTotal.toFixed(2);

        // Lock button and hide previous delivery info
        submitBtn.disabled = true;
        btnText.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Checking...';
        infoBox.style.display = 'none';
        deliveryMsg.innerHTML = '';

        if (pincode.length === 6) {
            document.getElementById('pincodeLoading').style.display = 'block';

            const url = `/orders/calculate-shipping/?product_id={{product.id}}&pincode=${pincode}&quantity=${qty}&store_id={{store.id}}{% if variant %}&variant_id={{variant.id}}{% endif %}`;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('pincodeLoading').style.display = 'none';
                    infoBox.style.display = 'block';

                    if (data.success && data.delivery_time) {
                        // SUCCESS
                        deliveryMsg.className = 'text-success fw-bold';
                        deliveryMsg.innerHTML = `<i class="fas fa-truck-fast me-2"></i> Est. Delivery: ${data.delivery_time}`;
                        
                        // Map hidden logistics data
                        document.getElementById('id_courier_id_hidden').value = data.courier_id;
                        document.getElementById('id_courier_name_hidden').value = data.courier_name;
                        document.getElementById('id_estimated_delivery_date_hidden').value = data.delivery_time;
                        document.getElementById('id_weight_hidden').value = data.weight;
                        document.getElementById('id_length_hidden').value = data.length;
                        document.getElementById('id_breadth_hidden').value = data.breadth;
                        document.getElementById('id_height_hidden').value = data.height;
                        document.getElementById('id_pickup_address_hidden').value = data.pickup_address;
                        document.getElementById('id_pickup_pincode_hidden').value = data.pickup_pincode;
                        document.getElementById('id_pickup_address_type_hidden').value = data.pickup_location_type;

                        submitBtn.disabled = false;
                        btnText.innerHTML = '<i class="fas fa-check-circle me-2"></i> Proceed to Payment';
                    } else {
                        // FAILURE (Not Serviceable)
                        deliveryMsg.className = 'text-danger fw-bold';
                        deliveryMsg.innerHTML = `<i class="fas fa-exclamation-circle me-2"></i> ${data.error || 'Not serviceable at this pincode'}`;
                        
                        submitBtn.disabled = true;
                        btnText.innerHTML = '<i class="fas fa-lock me-2"></i> Proceed to Payment';
                    }
                })
                .catch(err => {
                    document.getElementById('pincodeLoading').style.display = 'none';
                    btnText.innerHTML = '<i class="fas fa-lock me-2"></i> Proceed to Payment';
                    console.error("Shipping check failed:", err);
                });
        } else {
            // Pincode is not 6 digits yet
            btnText.innerHTML = '<i class="fas fa-lock me-2"></i> Proceed to Payment';
        }
    }

    // Listener for Pincode changes
    document.querySelector('[name="shipping_pincode"]').addEventListener('input', (e) => {
        submitBtn.disabled = true;
        infoBox.style.display = 'none';
        
        clearTimeout(timer);
        timer = setTimeout(updateSummary, 700);
    });

    const qtyInput = document.querySelector('[name="quantity"]');
    if (qtyInput) {
        qtyInput.addEventListener('change', updateSummary);
    }

    window.onload = updateSummary;
</script>
{% endblock %}
