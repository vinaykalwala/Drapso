
{% load static %}

{% block title %}Wholeseller Analytics - My Business Dashboard{% endblock %}

{% block extra_css %}
<style>
    .dashboard-card { transition: transform 0.2s, box-shadow 0.2s; }
    .dashboard-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .stat-number { font-size: 2rem; font-weight: bold; line-height: 1.2; }
    .tab-active { background-color: #3b82f6; color: white; }
    .tab-inactive { background-color: #e5e7eb; color: #4b5563; }
    .tab-inactive:hover { background-color: #d1d5db; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .wholeseller-badge { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
</style>
{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="mb-8">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">My Wholeseller Dashboard</h1>
                <p class="text-gray-600 mt-2">Track your products, sales, and earnings</p>
            </div>
            <div class="wholeseller-badge text-white px-4 py-2 rounded-lg"><i class="fas fa-warehouse mr-2"></i>Wholeseller Portal</div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-4 mb-6">
        <div class="flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-2">
                <button onclick="changePeriod('daily')" class="period-btn px-4 py-2 rounded-lg bg-gray-200">Daily</button>
                <button onclick="changePeriod('weekly')" class="period-btn px-4 py-2 rounded-lg bg-gray-200">Weekly</button>
                <button onclick="changePeriod('monthly')" class="period-btn px-4 py-2 rounded-lg bg-blue-600 text-white">Monthly</button>
                <button onclick="changePeriod('yearly')" class="period-btn px-4 py-2 rounded-lg bg-gray-200">Yearly</button>
            </div>
            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <input type="date" id="custom_start" class="border rounded-lg px-3 py-1">
                    <span>to</span>
                    <input type="date" id="custom_end" class="border rounded-lg px-3 py-1">
                    <button onclick="applyCustomRange()" class="bg-gray-600 text-white px-4 py-1 rounded-lg">Apply</button>
                </div>
                <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
        </div>
    </div>

    <div class="mb-6 overflow-x-auto">
        <div class="flex gap-2 border-b border-gray-200 min-w-max">
            <button onclick="switchTab('overview')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-active"><i class="fas fa-chart-line mr-2"></i>My Overview</button>
            <button onclick="switchTab('products')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-boxes mr-2"></i>My Products</button>
            <button onclick="switchTab('sales')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-chart-bar mr-2"></i>My Sales</button>
            <button onclick="switchTab('settlements')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-hand-holding-usd mr-2"></i>My Settlements</button>
            <button onclick="switchTab('withdrawals')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-money-bill-wave mr-2"></i>Withdrawals</button>
            <button onclick="switchTab('inventory')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-clipboard-list mr-2"></i>Inventory Alerts</button>
        </div>
    </div>

    <div id="tabContent">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow-md p-6"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-8 w-32"></div></div>
            <div class="bg-white rounded-lg shadow-md p-6"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-8 w-32"></div></div>
            <div class="bg-white rounded-lg shadow-md p-6"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-8 w-32"></div></div>
            <div class="bg-white rounded-lg shadow-md p-6"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-8 w-32"></div></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let currentPeriod = 'monthly';
    let currentTab = 'overview';
    let customStart = null;
    let customEnd = null;

    function getCSRFToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, 10) === ('csrftoken' + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(10));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function changePeriod(period) {
        currentPeriod = period;
        customStart = null;
        customEnd = null;
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.classList.remove('bg-blue-600', 'text-white');
            btn.classList.add('bg-gray-200', 'text-gray-700');
        });
        event.target.classList.remove('bg-gray-200', 'text-gray-700');
        event.target.classList.add('bg-blue-600', 'text-white');
        document.getElementById('custom_start').value = '';
        document.getElementById('custom_end').value = '';
        loadTabContent();
    }

    function applyCustomRange() {
        const start = document.getElementById('custom_start').value;
        const end = document.getElementById('custom_end').value;
        if (start && end) {
            customStart = start;
            customEnd = end;
            currentPeriod = 'custom';
            loadTabContent();
        } else {
            alert('Please select both dates');
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('tab-active');
            btn.classList.add('tab-inactive');
        });
        event.target.classList.remove('tab-inactive');
        event.target.classList.add('tab-active');
        loadTabContent();
    }

    function refreshData() { loadTabContent(); }

    function formatCurrency(value) {
        return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 0 }).format(value);
    }

    function formatNumber(value) {
        return new Intl.NumberFormat('en-IN').format(value);
    }

    function buildApiUrl(endpoint) {
        let url = `/analytics/${endpoint}/`;
        const params = new URLSearchParams();
        if (currentPeriod !== 'custom') params.append('period', currentPeriod);
        if (customStart && customEnd) { params.append('start_date', customStart); params.append('end_date', customEnd); }
        const qs = params.toString();
        if (qs) url += `?${qs}`;
        return url;
    }

    function getEndpointForTab() {
        const endpoints = {
            'overview': 'dashboard-summary',
            'products': 'product-performance',
            'sales': 'top-products',
            'settlements': 'settlements',
            'withdrawals': 'settlements',
            'inventory': 'product-performance'
        };
        return endpoints[currentTab];
    }

    async function loadTabContent() {
        try {
            const endpoint = getEndpointForTab();
            const url = buildApiUrl(endpoint);
            const response = await fetch(url, { method: 'GET', headers: { 'X-Requested-With': 'XMLHttpRequest' }, credentials: 'same-origin' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            if (currentTab === 'overview') renderWholesellerOverview(data);
            else if (currentTab === 'products') renderWholesellerProducts(data);
            else if (currentTab === 'sales') renderWholesellerSales(data);
            else if (currentTab === 'settlements') renderWholesellerSettlements(data);
            else if (currentTab === 'withdrawals') renderWholesellerWithdrawals(data);
            else if (currentTab === 'inventory') renderWholesellerInventory(data);
            
        } catch (error) {
            document.getElementById('tabContent').innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">Error loading data: ${error.message}</div>`;
        }
    }

    function renderWholesellerOverview(data) {
        const revenue = data.revenue || {};
        const settlements = data.settlements || {};
        const products = data.product_performance || {};
        
        const html = `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                <div class="bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg shadow-lg p-6"><p class="text-sm">My Total Revenue</p><p class="text-2xl font-bold">${formatCurrency(revenue.total_revenue || 0)}</p><p class="text-xs">↑ ${revenue.revenue_growth || 0}% growth</p></div>
                <div class="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg shadow-lg p-6"><p class="text-sm">My Payout</p><p class="text-2xl font-bold">${formatCurrency(revenue.wholeseller_payout || 0)}</p><p class="text-xs">From ${revenue.order_count || 0} orders</p></div>
                <div class="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg shadow-lg p-6"><p class="text-sm">My Products</p><p class="text-2xl font-bold">${formatNumber(products.wholeseller_products?.total || 0)}</p><p class="text-xs">${products.wholeseller_products?.active || 0} active</p></div>
                <div class="bg-gradient-to-r from-orange-500 to-orange-600 text-white rounded-lg shadow-lg p-6"><p class="text-sm">Wallet Balance</p><p class="text-2xl font-bold">${formatCurrency(settlements.wallet_balance?.available || 0)}</p><p class="text-xs">Available for withdrawal</p></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-white rounded-lg shadow-lg p-6"><h3 class="text-lg font-semibold mb-4">My Revenue Trend</h3><canvas id="revenueChart" height="250"></canvas></div>
                <div class="bg-white rounded-lg shadow-lg p-6"><h3 class="text-lg font-semibold mb-4">My Top Selling Products</h3><div id="topProductsList" class="space-y-2"></div></div>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-6"><h3 class="text-lg font-semibold mb-4">My Settlement Status</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="bg-green-50 p-4 rounded"><p class="text-sm text-gray-600">Settled Amount</p><p class="text-xl font-bold text-green-600">${formatCurrency(settlements.settlements?.total_settled_amount || 0)}</p></div><div class="bg-yellow-50 p-4 rounded"><p class="text-sm text-gray-600">In Escrow</p><p class="text-xl font-bold text-yellow-600">${formatCurrency(settlements.settlements?.total_escrow_amount || 0)}</p></div><div class="bg-blue-50 p-4 rounded"><p class="text-sm text-gray-600">Next Settlement</p><p class="text-xl font-bold text-blue-600">${settlements.settlements?.average_settlement_days || 3} days</p></div></div></div>
        `;
        document.getElementById('tabContent').innerHTML = html;
        
        if (revenue.data_points) {
            new Chart(document.getElementById('revenueChart'), { type: 'line', data: { labels: revenue.data_points.map(p => p.date || p.month), datasets: [{ label: 'Revenue', data: revenue.data_points.map(p => p.revenue), borderColor: '#3b82f6', fill: true }] } });
        }
        
        const topProducts = data.top_products?.products || [];
        document.getElementById('topProductsList').innerHTML = topProducts.slice(0,5).map(p => `<div class="flex justify-between items-center border-b pb-2"><span>${p.product_name}</span><span class="font-bold">${p.total_quantity_sold} units</span><span class="text-green-600">${formatCurrency(p.total_revenue)}</span></div>`).join('') || '<p class="text-gray-500">No sales data yet</p>';
    }

    function renderWholesellerProducts(data) {
        const products = data.wholeseller_products || {};
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">My Product Catalog</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-blue-50 p-4 rounded"><p>Total Products</p><p class="text-2xl font-bold">${products.total || 0}</p></div>
                    <div class="bg-green-50 p-4 rounded"><p>Active Products</p><p class="text-2xl font-bold">${products.active || 0}</p></div>
                    <div class="bg-purple-50 p-4 rounded"><p>With Variants</p><p class="text-2xl font-bold">${products.with_variants || 0}</p></div>
                    <div class="bg-orange-50 p-4 rounded"><p>New This Period</p><p class="text-2xl font-bold">${products.new_in_period || 0}</p></div>
                </div>
                <div class="mt-4 p-4 bg-yellow-50 rounded"><h4 class="font-semibold">💡 Tip</h4><p>Products with variants sell 40% more on average. Add variants to increase sales!</p></div>
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    function renderWholesellerSales(data) {
        const products = data.products || [];
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">My Top Selling Products</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-gradient-to-r from-purple-500 to-pink-500 text-white p-4 rounded"><p>Total Units Sold</p><p class="text-2xl font-bold">${formatNumber(data.total_products_sold || 0)}</p></div>
                    <div class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white p-4 rounded"><p>Most Popular</p><p class="text-lg font-bold">${products[0]?.product_name || 'N/A'}</p></div>
                    <div class="bg-gradient-to-r from-green-500 to-emerald-500 text-white p-4 rounded"><p>Total Revenue</p><p class="text-2xl font-bold">${formatCurrency(products.reduce((s, p) => s + p.total_revenue, 0))}</p></div>
                </div>
                <div class="overflow-x-auto"><table class="min-w-full"><thead class="bg-gray-50"><tr><th>Rank</th><th>Product</th><th>Units Sold</th><th>Revenue</th><th>% of Sales</th></tr></thead><tbody>${products.slice(0,10).map(p => `<tr><td class="border px-4 py-2">#${p.rank}</td><td class="border px-4 py-2">${p.product_name}</td><td class="border px-4 py-2 font-bold">${p.total_quantity_sold}</td><td class="border px-4 py-2 text-green-600">${formatCurrency(p.total_revenue)}</td><td class="border px-4 py-2"><div class="w-24 bg-gray-200 rounded-full h-2"><div class="bg-blue-500 h-2 rounded-full" style="width: ${p.sales_percentage}%"></div></div>${p.sales_percentage}%</td></tr>`).join('')}</tbody></td></div>
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    function renderWholesellerSettlements(data) {
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">My Settlement Overview</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-green-50 p-6 rounded-lg text-center"><p class="text-gray-600">Total Settled</p><p class="text-3xl font-bold text-green-600">${formatCurrency(data.settlements?.total_settled_amount || 0)}</p><p class="text-sm">Released to wallet</p></div>
                    <div class="bg-yellow-50 p-6 rounded-lg text-center"><p class="text-gray-600">In Escrow</p><p class="text-3xl font-bold text-yellow-600">${formatCurrency(data.settlements?.total_escrow_amount || 0)}</p><p class="text-sm">Waiting for 3-day buffer</p></div>
                    <div class="bg-blue-50 p-6 rounded-lg text-center"><p class="text-gray-600">Next Release Date</p><p class="text-2xl font-bold text-blue-600">${new Date(Date.now() + 3*24*60*60*1000).toLocaleDateString()}</p><p class="text-sm">After 3-day settlement period</p></div>
                </div>
                ${data.wallet_balance ? `<div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-6 rounded-lg"><h4 class="font-semibold text-lg">💰 My Wallet Balance</h4><div class="grid grid-cols-3 gap-4 mt-4"><div><p class="text-sm opacity-90">Available</p><p class="text-2xl font-bold">${formatCurrency(data.wallet_balance.available)}</p></div><div><p class="text-sm opacity-90">In Escrow</p><p class="text-2xl font-bold">${formatCurrency(data.wallet_balance.escrow)}</p></div><div><p class="text-sm opacity-90">Pending Withdrawal</p><p class="text-2xl font-bold">${formatCurrency(data.wallet_balance.pending_withdrawal)}</p></div></div></div>` : ''}
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    function renderWholesellerWithdrawals(data) {
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">Withdrawal Requests</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-blue-50 p-4 rounded"><p>Total Withdrawn</p><p class="text-2xl font-bold">${formatCurrency(data.withdrawal_stats?.total_completed || 0)}</p></div>
                    <div class="bg-yellow-50 p-4 rounded"><p>Pending Requests</p><p class="text-2xl font-bold">${data.withdrawal_stats?.pending_count || 0}</p></div>
                    <div class="bg-green-50 p-4 rounded"><p>Min Withdrawal</p><p class="text-2xl font-bold">₹100</p></div>
                </div>
                <div class="bg-gray-50 p-4 rounded"><h4 class="font-semibold">NEFT Payout Info</h4><p>Each withdrawal costs ₹${data.neft_fee_structure?.total || 2.36} (includes GST). Weekly limit: ₹50,000</p><button class="mt-3 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700" onclick="alert('Withdrawal request feature coming soon')">Request Withdrawal</button></div>
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    function renderWholesellerInventory(data) {
        const products = data.reseller_products || {};
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">⚠️ Inventory Alerts</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-red-50 p-6 rounded-lg text-center"><p class="text-gray-600">Low Stock Products</p><p class="text-3xl font-bold text-red-600">${products.low_stock || 0}</p><p class="text-sm">Need restocking soon</p></div>
                    <div class="bg-orange-50 p-6 rounded-lg text-center"><p class="text-gray-600">Out of Stock</p><p class="text-3xl font-bold text-orange-600">${products.out_of_stock || 0}</p><p class="text-sm">Currently unavailable</p></div>
                </div>
                ${(products.low_stock || 0) > 0 ? `<div class="bg-yellow-50 p-4 rounded"><h4 class="font-semibold text-orange-800">⚠️ Action Required</h4><p>You have ${products.low_stock} products running low on stock. Update inventory to avoid lost sales.</p></div>` : '<div class="bg-green-50 p-4 rounded"><h4 class="font-semibold text-green-800">✓ All Good!</h4><p>Your inventory levels are healthy.</p></div>'}
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', () => { loadTabContent(); });
</script>
{% endblock %}
