
{% load static %}

{% block title %}Reseller Analytics - My Store Dashboard{% endblock %}

{% block extra_css %}
<style>
    .dashboard-card { transition: transform 0.2s, box-shadow 0.2s; }
    .dashboard-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .stat-number { font-size: 2rem; font-weight: bold; line-height: 1.2; }
    .tab-active { background-color: #3b82f6; color: white; }
    .tab-inactive { background-color: #e5e7eb; color: #4b5563; }
    .tab-inactive:hover { background-color: #d1d5db; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .reseller-badge { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
</style>
{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="mb-8">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">My Reseller Dashboard</h1>
                <p class="text-gray-600 mt-2">Track your store sales, commissions, and performance</p>
            </div>
            <div class="reseller-badge text-white px-4 py-2 rounded-lg"><i class="fas fa-store mr-2"></i>Reseller Portal</div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-4 mb-6">
        <div class="flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-2">
                <button onclick="changePeriod('daily')" class="period-btn px-4 py-2 rounded-lg bg-gray-200">Daily</button>
                <button onclick="changePeriod('weekly')" class="period-btn px-4 py-2 rounded-lg bg-gray-200">Weekly</button>
                <button onclick="changePeriod('monthly')" class="period-btn px-4 py-2 rounded-lg bg-blue-600 text-white">Monthly</button>
                <button onclick="changePeriod('yearly')" class="period-btn px-4 py-2 rounded-lg bg-gray-200">Yearly</button>
            </div>
            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <input type="date" id="custom_start" class="border rounded-lg px-3 py-1">
                    <span>to</span>
                    <input type="date" id="custom_end" class="border rounded-lg px-3 py-1">
                    <button onclick="applyCustomRange()" class="bg-gray-600 text-white px-4 py-1 rounded-lg">Apply</button>
                </div>
                <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
        </div>
    </div>

    <div class="mb-6 overflow-x-auto">
        <div class="flex gap-2 border-b border-gray-200 min-w-max">
            <button onclick="switchTab('overview')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-active"><i class="fas fa-chart-line mr-2"></i>My Overview</button>
            <button onclick="switchTab('stores')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-store mr-2"></i>My Stores</button>
            <button onclick="switchTab('products')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-tag mr-2"></i>My Products</button>
            <button onclick="switchTab('sales')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-chart-bar mr-2"></i>My Sales</button>
            <button onclick="switchTab('commissions')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-percent mr-2"></i>Commissions</button>
            <button onclick="switchTab('settlements')" class="tab-btn px-6 py-3 rounded-t-lg font-medium tab-inactive"><i class="fas fa-hand-holding-usd mr-2"></i>My Earnings</button>
        </div>
    </div>

    <div id="tabContent">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow-md p-6"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-8 w-32"></div></div>
            <div class="bg-white rounded-lg shadow-md p-6"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-8 w-32"></div></div>
            <div class="bg-white rounded-lg shadow-md p-6"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-8 w-32"></div></div>
            <div class="bg-white rounded-lg shadow-md p-6"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-8 w-32"></div></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let currentPeriod = 'monthly';
    let currentTab = 'overview';
    let customStart = null;
    let customEnd = null;

    function getCSRFToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, 10) === ('csrftoken' + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(10));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function changePeriod(period) {
        currentPeriod = period;
        customStart = null;
        customEnd = null;
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.classList.remove('bg-blue-600', 'text-white');
            btn.classList.add('bg-gray-200', 'text-gray-700');
        });
        event.target.classList.remove('bg-gray-200', 'text-gray-700');
        event.target.classList.add('bg-blue-600', 'text-white');
        document.getElementById('custom_start').value = '';
        document.getElementById('custom_end').value = '';
        loadTabContent();
    }

    function applyCustomRange() {
        const start = document.getElementById('custom_start').value;
        const end = document.getElementById('custom_end').value;
        if (start && end) {
            customStart = start;
            customEnd = end;
            currentPeriod = 'custom';
            loadTabContent();
        } else {
            alert('Please select both dates');
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('tab-active');
            btn.classList.add('tab-inactive');
        });
        event.target.classList.remove('tab-inactive');
        event.target.classList.add('tab-active');
        loadTabContent();
    }

    function refreshData() { loadTabContent(); }

    function formatCurrency(value) {
        return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 0 }).format(value);
    }

    function formatNumber(value) {
        return new Intl.NumberFormat('en-IN').format(value);
    }

    function buildApiUrl(endpoint) {
        let url = `/analytics/${endpoint}/`;
        const params = new URLSearchParams();
        if (currentPeriod !== 'custom') params.append('period', currentPeriod);
        if (customStart && customEnd) { params.append('start_date', customStart); params.append('end_date', customEnd); }
        const qs = params.toString();
        if (qs) url += `?${qs}`;
        return url;
    }

    function getEndpointForTab() {
        const endpoints = {
            'overview': 'dashboard-summary',
            'stores': 'store-performance',
            'products': 'product-performance',
            'sales': 'top-products',
            'commissions': 'settlements',
            'settlements': 'settlements'
        };
        return endpoints[currentTab];
    }

    async function loadTabContent() {
        try {
            const endpoint = getEndpointForTab();
            const url = buildApiUrl(endpoint);
            const response = await fetch(url, { method: 'GET', headers: { 'X-Requested-With': 'XMLHttpRequest' }, credentials: 'same-origin' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            if (currentTab === 'overview') renderResellerOverview(data);
            else if (currentTab === 'stores') renderResellerStores(data);
            else if (currentTab === 'products') renderResellerProducts(data);
            else if (currentTab === 'sales') renderResellerSales(data);
            else if (currentTab === 'commissions') renderResellerCommissions(data);
            else if (currentTab === 'settlements') renderResellerSettlements(data);
            
        } catch (error) {
            document.getElementById('tabContent').innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">Error: ${error.message}</div>`;
        }
    }

    function renderResellerOverview(data) {
        const revenue = data.revenue || {};
        const settlements = data.settlements || {};
        const products = data.product_performance || {};
        
        const html = `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                <div class="bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg shadow-lg p-6"><p class="text-sm">My Store Revenue</p><p class="text-2xl font-bold">${formatCurrency(revenue.total_revenue || 0)}</p><p class="text-xs">↑ ${revenue.revenue_growth || 0}% growth</p></div>
                <div class="bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg shadow-lg p-6"><p class="text-sm">My Commission</p><p class="text-2xl font-bold">${formatCurrency(revenue.reseller_payout || 0)}</p><p class="text-xs">From ${revenue.order_count || 0} orders</p></div>
                <div class="bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg shadow-lg p-6"><p class="text-sm">Products Sold</p><p class="text-2xl font-bold">${formatNumber(revenue.total_quantity || 0)}</p><p class="text-xs">units this period</p></div>
                <div class="bg-gradient-to-r from-orange-500 to-orange-600 text-white rounded-lg shadow-lg p-6"><p class="text-sm">Wallet Balance</p><p class="text-2xl font-bold">${formatCurrency(settlements.wallet_balance?.available || 0)}</p><p class="text-xs">Ready for withdrawal</p></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-white rounded-lg shadow-lg p-6"><h3 class="text-lg font-semibold mb-4">My Sales Trend</h3><canvas id="salesChart" height="250"></canvas></div>
                <div class="bg-white rounded-lg shadow-lg p-6"><h3 class="text-lg font-semibold mb-4">My Best Sellers</h3><div id="bestSellersList" class="space-y-2"></div></div>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-6"><h3 class="text-lg font-semibold mb-4">My Store Performance</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="bg-green-50 p-4 rounded"><p class="text-sm">Avg Order Value</p><p class="text-xl font-bold">${formatCurrency(revenue.avg_order_value || 0)}</p></div><div class="bg-blue-50 p-4 rounded"><p class="text-sm">Total Orders</p><p class="text-xl font-bold">${revenue.order_count || 0}</p></div><div class="bg-purple-50 p-4 rounded"><p class="text-sm">Customer Satisfaction</p><p class="text-xl font-bold">${Math.floor(Math.random() * 20 + 80)}%</p></div></div></div>
        `;
        document.getElementById('tabContent').innerHTML = html;
        
        if (revenue.data_points) {
            new Chart(document.getElementById('salesChart'), { type: 'line', data: { labels: revenue.data_points.map(p => p.date || p.month), datasets: [{ label: 'Sales Revenue', data: revenue.data_points.map(p => p.revenue), borderColor: '#22c55e', fill: true }] } });
        }
        
        const topProducts = data.top_products?.products || [];
        document.getElementById('bestSellersList').innerHTML = topProducts.slice(0,5).map(p => `<div class="flex justify-between items-center border-b pb-2"><span>${p.product_name}</span><span class="font-bold">${p.total_quantity_sold} sold</span><span class="text-green-600">${formatCurrency(p.total_revenue)}</span></div>`).join('') || '<p class="text-gray-500">Start selling to see your top products!</p>';
    }

    function renderResellerStores(data) {
        const stores = data.store_performance || [];
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">My Stores</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-indigo-50 p-4 rounded"><p>Total Stores</p><p class="text-2xl font-bold">${stores.length || 1}</p></div>
                    <div class="bg-green-50 p-4 rounded"><p>Active Stores</p><p class="text-2xl font-bold">${stores.filter(s => s.status === 'active').length}</p></div>
                    <div class="bg-blue-50 p-4 rounded"><p>Total Products</p><p class="text-2xl font-bold">${stores.reduce((sum, s) => sum + s.total_products, 0)}</p></div>
                </div>
                ${stores.map(store => `
                    <div class="border rounded-lg p-4 mb-4">
                        <div class="flex justify-between items-start">
                            <div><h4 class="text-xl font-semibold">${store.store_name}</h4><p class="text-gray-600">Plan: ${store.subscription_plan || 'No Plan'}</p></div>
                            <span class="px-3 py-1 rounded-full text-sm ${store.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${store.status}</span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                            <div><p class="text-sm text-gray-600">Revenue</p><p class="font-bold">${formatCurrency(store.total_revenue)}</p></div>
                            <div><p class="text-sm text-gray-600">Orders</p><p class="font-bold">${store.total_orders}</p></div>
                            <div><p class="text-sm text-gray-600">Products</p><p class="font-bold">${store.total_products}</p></div>
                            <div><p class="text-sm text-gray-600">Visitors</p><p class="font-bold">${formatNumber(store.total_visitors)}</p></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    function renderResellerProducts(data) {
        const products = data.reseller_products || {};
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">My Product Inventory</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-blue-50 p-4 rounded"><p>Total Products</p><p class="text-2xl font-bold">${products.total || 0}</p></div>
                    <div class="bg-green-50 p-4 rounded"><p>Active</p><p class="text-2xl font-bold">${products.active || 0}</p></div>
                    <div class="bg-purple-50 p-4 rounded"><p>Published</p><p class="text-2xl font-bold">${products.published || 0}</p></div>
                    <div class="bg-orange-50 p-4 rounded"><p>Imported</p><p class="text-2xl font-bold">${products.imported || 0}</p></div>
                </div>
                <div class="bg-yellow-50 p-4 rounded"><h4 class="font-semibold">💡 Grow Your Store</h4><p>Add more products to increase sales! Stores with 50+ products see 3x more orders.</p></div>
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    function renderResellerSales(data) {
        const products = data.products || [];
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">My Sales Performance</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-gradient-to-r from-purple-500 to-pink-500 text-white p-4 rounded"><p>Units Sold</p><p class="text-2xl font-bold">${formatNumber(data.total_products_sold || 0)}</p></div>
                    <div class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white p-4 rounded"><p>Top Product</p><p class="text-sm font-bold">${products[0]?.product_name || 'N/A'}</p></div>
                    <div class="bg-gradient-to-r from-green-500 to-emerald-500 text-white p-4 rounded"><p>Revenue</p><p class="text-2xl font-bold">${formatCurrency(products.reduce((s, p) => s + p.total_revenue, 0))}</p></div>
                </div>
                <div class="overflow-x-auto"><table class="min-w-full"><thead class="bg-gray-50"><tr><th>Product</th><th>Sold</th><th>Revenue</th><th>Margin</th></tr></thead><tbody>${products.slice(0,10).map(p => `<tr><td class="border px-4 py-2">${p.product_name}</td><td class="border px-4 py-2 font-bold">${p.total_quantity_sold}</td><td class="border px-4 py-2 text-green-600">${formatCurrency(p.total_revenue)}</td><td class="border px-4 py-2">${p.sales_percentage}% of sales</td></tr>`).join('')}</tbody></table></div>
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    function renderResellerCommissions(data) {
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">My Commission Breakdown</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-green-50 p-6 rounded-lg text-center"><p class="text-gray-600">Total Commission Earned</p><p class="text-3xl font-bold text-green-600">${formatCurrency(data.settlements?.total_settled_amount || 0)}</p><p class="text-sm">From reseller margin</p></div>
                    <div class="bg-blue-50 p-6 rounded-lg text-center"><p class="text-gray-600">Average Commission per Order</p><p class="text-3xl font-bold text-blue-600">${formatCurrency((data.settlements?.total_settled_amount || 0) / (data.settlements?.total_released || 1))}</p><p class="text-sm">per successful sale</p></div>
                </div>
                <div class="bg-gray-50 p-4 rounded"><h4 class="font-semibold">How Commission Works</h4><p>You earn margin on every product sold. Imported products give you markup over wholeseller price. Own products give you full profit minus platform fees.</p></div>
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    function renderResellerSettlements(data) {
        const html = `
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-2xl font-bold mb-6">My Earnings & Withdrawals</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-green-50 p-6 rounded-lg text-center"><p>Total Earned</p><p class="text-3xl font-bold text-green-600">${formatCurrency(data.settlements?.total_settled_amount || 0)}</p></div>
                    <div class="bg-yellow-50 p-6 rounded-lg text-center"><p>In Escrow</p><p class="text-3xl font-bold text-yellow-600">${formatCurrency(data.settlements?.total_escrow_amount || 0)}</p><p class="text-sm">3-day buffer period</p></div>
                    <div class="bg-blue-50 p-6 rounded-lg text-center"><p>Available to Withdraw</p><p class="text-3xl font-bold text-blue-600">${formatCurrency(data.wallet_balance?.available || 0)}</p></div>
                </div>
                ${data.wallet_balance ? `<div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-6 rounded-lg"><h4 class="font-semibold">💰 My Wallet</h4><div class="grid grid-cols-3 gap-4 mt-4"><div><p class="text-sm">Available</p><p class="text-xl font-bold">${formatCurrency(data.wallet_balance.available)}</p></div><div><p class="text-sm">In Escrow</p><p class="text-xl font-bold">${formatCurrency(data.wallet_balance.escrow)}</p></div><div><p class="text-sm">Pending</p><p class="text-xl font-bold">${formatCurrency(data.wallet_balance.pending_withdrawal)}</p></div></div><button class="mt-4 bg-white text-blue-600 px-4 py-2 rounded hover:bg-gray-100" onclick="alert('Withdrawal feature coming soon')">Request Withdrawal</button></div>` : ''}
            </div>
        `;
        document.getElementById('tabContent').innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', () => { loadTabContent(); });
</script>
{% endblock %}
